<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/main.css">
  <title>가상 요소</title>
  
</head>
<body>
  <h1> 가상 요소 start title</h1>
  <!-- CSS가 ::before 로 앞에 별(⭐)을 붙여준다-->
  <h1 class="start-title"> 즐겨 찾기 메뉴 start title after</h1> 
  <!-- ::before 와 ::after 로 양 옆에 따옴표가 생긴다.-->
  <p class="quote"> 가짜 요소는 HTML에 없다 quote</p>
  <!-- ::after 로 글자 아래 파란 줄이 그려진다.-->
  <p class="underline-deco"> 밑줄 장식이 붙은 문장 under-deco </p>
</body>
</html>
