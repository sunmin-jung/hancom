<!DOCTYPE html> <!-- HTML 선언 문서-->
<html lang="ko"><!-- 한국어 문서 시작--> 
<head>          <!--화면에 안 보이는 준비 칸-->
    <meta charset="UTF-8"> <!-- 한글 안깨지게-->
    <title>시맨틱 구조</title> <!--브라우저 탭에 뜨는 이름-->
</head>
<body>          <!--화면에 보이는 내용 칸-->
    <header>
        <h1>시멘틱 구조</h1>
        <nav>홈 ㅣ소개ㅣ 연락처</nav>
    </header>
   
    <main>
        <section>
            <!-- 완결된 글 하나-->
            <article>  
                첫 번째 글 내용
            </article>
        </section>

    </main>
    <aside> <!-- 본문 옆 보조 내용-->
        곁다리 정보(사이드바)
    </aside>
    <footer>
        2026 내 사이트 
    </footer>
</body>
</html>

<!--
div는 뜻 없는 빈 상자
시멘틱 태그는 이름만 봐도 무슨 구역인지 드러남
핵심 : header, nav, main, section, article, aside, footer-->
