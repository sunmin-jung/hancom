<!DOCTYPE html>        <!--HTML문서 선언-->
<html lang="ko">       <!--문서 시작 한국어-->
<head>                 <!--화면에 안보이는 준비칸-->
  <meta charset="UTF-8"> <!--한글 안깨지게-->
  <title> 입력 폼 </title>
</head>
<body>                  <!--화면에 보이는 잔짜 칸-->
    <!--입력 칸들을 담는 묶는 상자-->
    <form>
        <!--label : 설명 글자, input : 글자 칸-->
        <label>이름:<input type="text" placeholer="이름 입력"></label>
        <br>
        <hr>
        <label>목표:<input type="number" placeholer="HTML 능력 목표치 1 ~ 10"></label>
        <br>
        <hr>
        <label>시간:<input type="number" placeholer="HTML 능력 목표치 1 ~ 3"></label>
        <br>
        <hr>
        <label>피드백:<input type="text" placeholer="멘트 입력"></label>
        <br>
        <hr>
        <button type="submit">보내기</button>

    </form>
</body>
</html>
