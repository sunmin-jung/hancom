<!DOCTYPE html>                 <!-- HTML 문서-->
<html lang="ko">                <!-- 문서 시작,한국어 페이지-->
    <head>                      <!-- 화면에 안보이는 준비 칸-->
        <meta charset="UTF-8">  <!-- 한글 안 깨지게-->
        <title>제목과 문단</title><!-- 브라우저 탭에 뜨는 이름-->
    </head>
    <body>                      <!--화면에 보이는 진짜 내용 칸-->
        <!-- 제목은 크기 6단계(h1이 제일 크고 숫자 커질수록 작아짐)-->
        <h1>제일 큰 글자h1</h1>
        <h2>제일 큰 글자h2</h2>
        <h3>제일 큰 글자h3</h3>
        <h4>제일 큰 글자h4</h4>
        <h5>제일 큰 글자h5</h5>
        <h6>제일 큰 글자h6</h6>
        <!--문단(글 한 덩어리)-->
        <p>저는 HTML을 배우는 사람입니다</p>      
    </body>
</html>
