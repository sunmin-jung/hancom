<!DOCTYPE html>     <!--문서 선언-->
<html lang="ko">    <!--문서 시작 한국어 페이지-->
<head>              <!--화면에 안보이는 준비 칸-->
    <meta charset="UTF-8"><!--한글 안깨지게-->
</head>    
<body>              <!--화면에 보이는 칸-->
    <h1>입력 Type</h1>
    <form>
        <label>이메일 : <input type="email" placeholder="메일"> </label> <br>
        <label>비밀번호 : <input type="password"></label><br>
        <label>동의<input type="checkbox"></label><br>
        <label>성별<input type="radio" name="gender">남</label>
        <label><input type="radio" name="gender">여</label><br>
        <input type="date"><br>
        <input type="month"><br>
        <input type="week"><br>
        <input type="color"><br>

        <br>
        <textarea>안녕하세요</textarea><br>
        <select>
            <option>서울</option>
            <option>부산</option>
            <option>제주도</option>
        </select>
        <label>상세 : <input type="text" maxlength="5"></label><br>

    </form>
</body>
</html>
