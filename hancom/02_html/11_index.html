<!DOCTYPE html>    <!-- 이건 HTML문서-->
<html lang="ko">   <!-- 문서 시작 한국어 페이지-->
    <!-- 화면에 보이지 않는 칸-->
    <head>         
        <meta charset="UTF-8">  <!-- 한글 안 깨지도록-->
        <!-- 브라우저 탭 이름-->
        <title> 
            자기 소개
        </title>
    </head>
    <!-- 화면에 보이는 칸-->
    <body>
        <header>
            <h3>
                정선민의 소개 페이지
            </h3>
        </header>
        <!-- 핵심 내용 (페이지에 하나)-->
        <main>
            <img src="https://picsum.photos/300/200" alt="내 사진"/>
            <img src="../02_html/image1.jpg" width="150" height="150" alt="내사진"/> 
            <p>안녕하세요 저는 웹 개발을 배우는 정선민 입니다</p>
            <ul>
                <li><strong>취미</strong>: 산책과 영화</li>                
                <li><strong>목표</strong>: 웹사이트 만들기</li>
                <li><strong>이메일</strong>: wjdtjsals@naver.com</li>
            </ul>
                       
        </main>
        <!-- 맨 아래 꼬리말-->
        <footer>
            <a href="https://blog.naver.com/wjdtjsals91/">블로그 보러가기</a><br>
            <a href="https://github.com/sunmin-jung/hancom/">깃허브 보러가기</a>
        </footer>
    </body>
</html>

<!-- 요소: 여는 태그 + 내용 + 닫는 태그
빈요소: <img/>,<meta>
시맨틱: <header></header>,<main></main>,<footer></footer>
속성: 태그 안에 들어가는 값 예 <a href="https://www.google.com"></a> -->
