<!DOCTYPE html>    <!--HTMl 문서 선언-->
<html lang="ko">   <!--문서 시작,한국어 페이지 --> 
<head>             <!--화면 안보이는 준비 칸-->
    <meta charset="UTF-8"> <!--한글 안깨지게-->
    <title>표 칸 합치기</title> <!--브라우저 탭 이름-->
</head>
<body>             <!--화면 보이는 칸-->
    <h1>표 합치기</h1>
    <table border="5">
        <thead>
            <tr>
                <th colspan="3"> <!--가로 3칸을 하나로 합침-->
                    성적표
                </th>
            </tr>
        </thead>
        <tbody>
            <tr><td rowspan="5">과목</td><td>영어</td><td>90</td></tr>
            <tr><td>수학</td><td>85</td></tr>
            <tr><td>국어</td><td>95</td></tr>
            <tr><td>사회</td><td>95</td></tr>
            <tr><td>공학</td><td>95</td></tr>
        </tbody>
    </table>
</body>
</html>
