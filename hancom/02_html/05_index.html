<!DOCTYPE html>     <!--HTML 문서-->
<html lang="ko">    <!--문서 시작,한국어-->
    <head>          <!--화면엔 안보 이는 준비 칸-->
        <meta charset="UTF-8"> <!--한글 안 깨지게-->
        <title>태그 + 뼈대</title>     <!--브라우저 탭 뜨는 이름-->
    </head>
    <body>          <!--화면에 보이는 진짜 내용 칸-->
        <h1>태그와 뼈대를 공부하자!</h1>
    </body>
</html>
<!-- - 요소(element) = 여는 태그 + 내용 + 닫는 태그
- 태그 이름은 대소문자 안 가림 (H1 = h1) -->
