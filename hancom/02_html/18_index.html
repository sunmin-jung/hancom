<!DOCTYPE html>  <!--HTML 문서 선언-->
<html lang="ko"> <!--문서 시작 한국어 페이지--> 
<head>           <!--화면에 안 보이는 준비 칸-->
    <meta charset="UTF-8"> <!--한글 안 깨지게-->
    <title>class 이름표</title> <!--브라우저 탭에 뜨는 이름-->
    
</head>
<body>
    <!--class = 여러 요소가 함께 쓰는 이름표 (같은 값 여러번 ok)-->
    <h1>Class</h1>
    <p class="text1">안녕 나는 오늘 일찍 자려공</p>
    <p class="text2">몇 시에 누울까?</p>
    <p class="text3">아마 11시</p>
</body>
</html>
