<!DOCTYPE html>  <!-- HTML 문서 선언-->
<html lang="ko"> <!-- 문서 시작 한국어 페이지-->
<head>           <!--화면에 안보이는 준비칸-->
<meta charset="UTF-8"> <!--한글 안깨지게-->
    <title>글자 꾸미기</title> <!--브라우저 탭에 뜨는 이름-->
</head>
<body>  <!--보이는 칸-->
<h1> 글자 꾸미기</h1>
<p><em>기울임 강조</em></p>
<p><mark>형광펜 입니다</mark></p>
<p><small>작게 쓰는 글씨</small></p>
<blockquote>남의 말을 인용합니다.</blockquote>
<p>H<sub>2</sub>0</p>
<p>X<sup>2</sup></p>
</body>    

</html>
