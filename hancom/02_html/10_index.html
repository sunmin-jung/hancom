<!DOCTYPE html>     <!-- html 문서 -->
<html lang="ko">    <!-- 문서 시작 -->
<head>              <!-- 화면에 안보이는 준비 칸 -->
    <meta charset="UTF-8"> <!-- 브라우저 탭에 뜨는 이름-->
</head>
<body>
    <!-- 시맨틱 태그 = 어느 부분인지 뜻이 담긴 이름표 상자 -->
     <header>
        맨 위 (로고 혹은 제목)
     </header> <!--페이지 맨 위 구역-->
     <main>
        <!-- ul = 점 찍힌 목록 상자, li = 목록 안의 한줄 -->
        <ul>
            <li>
                좋아하는 것 : 영화
            </li>
            <li>
                취미 : 산책
            </li>
            <li>
                목표 : 웹 개발자
            </li>
            <li>
                여행지 : 미국
            </li>
            <li>
                좋아하는 음식 : 한식
            </li>
        </ul> 
           
     </main>
     <!-- 페이지 맨 아래 구역-->
     <footer>
        맨 아래 (저작권 및 연락처)
        <br>
        저작권:
        <br>
        연락처:
     </footer>
</body>
</html>
