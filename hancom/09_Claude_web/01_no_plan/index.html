<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계산기</title>

  <!-- 2단계: CSS로 예쁘게 꾸미기 -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: "맑은 고딕", sans-serif;
    }

    .calculator {
      width: 320px;
      background: #1c1c1e;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }

    .screen {
      height: 100px;
      color: #fff;
      font-size: 56px;
      font-weight: 300;
      text-align: right;
      padding: 10px 16px;
      overflow: hidden;
      word-break: break-all;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      height: 64px;
      border: none;
      border-radius: 50%;
      font-size: 26px;
      color: #fff;
      background: #333;
      cursor: pointer;
      transition: filter 0.15s;
    }
    button:hover { filter: brightness(1.3); }
    button:active { filter: brightness(0.8); }

    .operator { background: #ff9500; }
    .equal    { background: #ff9500; }
    .clear, .del { background: #a5a5a5; color: #000; }

    /* 0 버튼은 가로로 2칸 차지하게 */
    .zero {
      grid-column: span 2;
      border-radius: 32px;
      text-align: left;
      padding-left: 26px;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <!-- 숫자가 보이는 화면 -->
    <div class="screen" id="screen">0</div>

    <!-- 버튼들 -->
    <div class="buttons">
      <button class="clear" onclick="clearScreen()">C</button>
      <button class="operator" onclick="press('÷')">÷</button>
      <button class="operator" onclick="press('×')">×</button>
      <button class="del" onclick="del()">←</button>

      <button onclick="press('7')">7</button>
      <button onclick="press('8')">8</button>
      <button onclick="press('9')">9</button>
      <button class="operator" onclick="press('−')">−</button>

      <button onclick="press('4')">4</button>
      <button onclick="press('5')">5</button>
      <button onclick="press('6')">6</button>
      <button class="operator" onclick="press('+')">+</button>

      <button onclick="press('1')">1</button>
      <button onclick="press('2')">2</button>
      <button onclick="press('3')">3</button>
      <button class="equal" onclick="calculate()">=</button>

      <button class="zero" onclick="press('0')">0</button>
      <button onclick="press('.')">.</button>
    </div>
  </div>

  <!-- 3단계: JavaScript로 계산 기능 만들기 -->
  <script>
    // 화면(스크린)을 가리키는 변수
    const screen = document.getElementById('screen');

    // 지금까지 누른 식을 저장하는 곳
    let expression = '';

    // 숫자나 연산자 버튼을 눌렀을 때
    function press(value) {
      // 화면이 '0' 하나만 있으면 지우고 새 숫자로 시작
      if (expression === '' && !isNaN(value)) {
        expression = value;
      } else {
        expression += value;
      }
      screen.textContent = expression;
    }

    // C 버튼: 전부 지우기
    function clearScreen() {
      expression = '';
      screen.textContent = '0';
    }

    // ← 버튼: 한 글자씩 지우기
    function del() {
      expression = expression.slice(0, -1);
      screen.textContent = expression === '' ? '0' : expression;
    }

    // = 버튼: 실제로 계산하기
    function calculate() {
      try {
        // 화면에 보이는 기호를 계산 가능한 기호로 바꿔줌
        const math = expression
          .replace(/÷/g, '/')
          .replace(/×/g, '*')
          .replace(/−/g, '-');

        const result = eval(math);   // 계산 실행
        screen.textContent = result;
        expression = String(result);
      } catch (e) {
        screen.textContent = '오류';
        expression = '';
      }
    }
  </script>

</body>
</html>
